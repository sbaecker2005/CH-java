# ============================================================
# Perfil LOCAL — H2 in-memory (sem Oracle, sem FIAP)
# ============================================================

# ─── Datasource H2 ──────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:crmdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=Oracle
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ─── H2 Console ─────────────────────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── JPA / Hibernate ────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── Flyway desabilitado (DDL pelo Hibernate) ───────────────
spring.flyway.enabled=false

# ─── Demo mode ativo ────────────────────────────────────────
app.demo-mode=true

# ─── Logs reduzidos ─────────────────────────────────────────
logging.level.com.hospitalrafael=INFO
logging.level.org.springframework.ai=WARN
