# ============================================================
# CRM Hospital São Rafael — Configurações de Produção
# ============================================================

# ─── Datasource Oracle ──────────────────────────────────────
spring.datasource.url=jdbc:oracle:thin:@oracle.fiap.com.br:1521:orcl
spring.datasource.username=${ORACLE_USER:SEU_RM_AQUI}
spring.datasource.password=${ORACLE_PASSWORD:SUA_SENHA_AQUI}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ─── JPA / Hibernate ────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ─── Flyway ─────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=true

# ─── Servidor ────────────────────────────────────────────────
server.port=8080

# ─── Spring AI (Anthropic Claude) ───────────────────────────
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY:}
spring.ai.anthropic.chat.options.model=claude-haiku-4-5-20251001
spring.ai.anthropic.chat.options.max-tokens=2048
spring.ai.anthropic.chat.options.temperature=0.7

# ─── JWT ─────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:crm-hospital-sao-rafael-secret-key-muito-segura-2024-fiap}
jwt.expiration-ms=86400000

# ─── Email (SMTP) ────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.default-encoding=UTF-8

# ─── Scheduler ───────────────────────────────────────────────
spring.task.scheduling.pool.size=5

# ─── CORS ────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ─── Modo Demo (ativa Zona de Testes no startup) ────────────
app.demo-mode=${APP_DEMO_MODE:false}

# ─── Actuator ────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true
info.app.name=CRM Hospital São Rafael
info.app.version=2.0.0
info.app.description=Sistema CRM hospitalar com IA integrada

# ─── Springdoc (Swagger) ─────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

# ─── Logs ────────────────────────────────────────────────────
logging.level.com.hospitalrafael=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springframework.ai=DEBUG
