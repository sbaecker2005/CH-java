<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/layout :: head('Detalhe do Lead')}"></head>
<body>

<div th:replace="~{fragments/layout :: sidebar(${paginaAtiva})}"></div>

<div class="topbar">
    <div class="d-flex align-items-center gap-3">
        <a href="/leads" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
        <div>
            <h4 class="mb-0 fw-bold" th:text="${lead != null ? lead.nome : 'Lead não encontrado'}">Lead</h4>
            <small class="text-muted">Detalhes completos do lead</small>
        </div>
    </div>
</div>

<div class="main-content">
    <div th:if="${erro}" class="alert alert-danger mb-4">
        <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${erro}"></span>
    </div>

    <div th:if="${lead}" class="row g-3">
        <!-- Informações principais -->
        <div class="col-md-8">
            <div class="card">
                <div class="card-header py-3 d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-person-circle text-primary me-2"></i>Informações do Lead</span>
                    <div>
                        <span th:if="${lead.fatorUrgencia}" class="badge bg-danger me-2">URGENTE</span>
                        <span class="badge"
                            th:text="${lead.status}"
                            th:classappend="${lead.status == 'Convertido'} ? 'bg-success' : (${lead.status == 'Cancelado'} ? 'bg-secondary' : (${lead.status == 'Novo'} ? 'bg-primary' : 'bg-warning text-dark'))">
                        </span>
                    </div>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-sm-6">
                            <label class="form-label small text-muted fw-semibold">NOME</label>
                            <p class="fw-semibold mb-0" th:text="${lead.nome}"></p>
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label small text-muted fw-semibold">E-MAIL</label>
                            <p class="mb-0" th:text="${lead.email}"></p>
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label small text-muted fw-semibold">TELEFONE</label>
                            <p class="mb-0" th:text="${lead.telefone}"></p>
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label small text-muted fw-semibold">CANAL DE ORIGEM</label>
                            <p class="mb-0" th:text="${lead.canalOrigem ?: '—'}"></p>
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label small text-muted fw-semibold">PROCEDIMENTO</label>
                            <p class="mb-0" th:text="${lead.procedimentoInteresse ?: '—'}"></p>
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label small text-muted fw-semibold">PLANO DE SAÚDE</label>
                            <p class="mb-0" th:text="${lead.planoSaude ?: '—'}"></p>
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label small text-muted fw-semibold">OPERADOR</label>
                            <p class="mb-0" th:text="${lead.operador != null ? lead.operador.nome : '—'}"></p>
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label small text-muted fw-semibold">ÚLTIMO CONTATO</label>
                            <p class="mb-0" th:text="${lead.ultimoContato ?: '—'}"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Lead Score -->
        <div class="col-md-4">
            <div class="card text-center">
                <div class="card-body py-4">
                    <p class="small text-muted fw-semibold text-uppercase mb-2">Lead Score</p>
                    <h1 class="display-6 fw-bold"
                        th:text="${lead.leadScore ?: '—'}"
                        th:classappend="${lead.leadScore == 'Muito Alto'} ? 'text-danger' : (${lead.leadScore == 'Alto'} ? 'text-warning' : 'text-secondary')">
                    </h1>
                    <div class="mt-3">
                        <span class="badge fs-6"
                            th:text="'Prioridade ' + (lead.prioridade != null ? lead.prioridade : '—')"
                            th:classappend="${lead.prioridade == 1} ? 'bg-danger' : (${lead.prioridade == 2} ? 'bg-warning text-dark' : (${lead.prioridade == 3} ? 'bg-info text-dark' : 'bg-secondary'))">
                        </span>
                    </div>
                    <hr/>
                    <div class="text-start">
                        <small class="d-flex justify-content-between mb-1">
                            <span class="text-muted">Urgência</span>
                            <strong th:text="${lead.fatorUrgencia ? '+3 pts ✓' : '0 pts'}"></strong>
                        </small>
                        <small class="d-flex justify-content-between mb-1">
                            <span class="text-muted">Canal</span>
                            <strong th:text="${lead.fatorCanal ?: '—'}"></strong>
                        </small>
                        <small class="d-flex justify-content-between">
                            <span class="text-muted">Tempo s/ resp.</span>
                            <strong th:text="${lead.fatorTempoSemResposta ?: '—'}"></strong>
                        </small>
                    </div>
                </div>
            </div>
            <div class="card mt-3">
                <div class="card-body">
                    <p class="small text-muted fw-semibold text-uppercase mb-2">Cadastro</p>
                    <small class="text-muted">ID: <strong th:text="${lead.id}"></strong></small><br/>
                    <small class="text-muted">Criado em: <strong th:text="${lead.criadoEm ?: '—'}"></strong></small>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
