# ============================================================
# CRM Hospital São Rafael — Configurações de Testes (H2)
# ============================================================

# ─── H2 In-Memory ───────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=Oracle
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

spring.h2.console.enabled=true

# ─── Desabilita Flyway nos testes (usa ddl-auto=create-drop) ─
spring.flyway.enabled=false

# ─── Spring AI (Mock nos testes) ────────────────────────────
spring.ai.anthropic.api-key=test-key
spring.ai.anthropic.chat.options.model=claude-haiku-4-5-20251001

# ─── JWT ─────────────────────────────────────────────────────
jwt.secret=test-secret-key-for-testing-purposes-only-crm-hospital
jwt.expiration-ms=3600000

# ─── Email (desabilitado nos testes) ────────────────────────
spring.mail.host=localhost
spring.mail.port=25

# ─── Scheduler desabilitado nos testes ──────────────────────
spring.task.scheduling.pool.size=1
